<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindSpace - Your Journey</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e040a0", "primary-fixed": "#ffd6ee", "primary-fixed-dim": "#f0a0cc",
                        "primary-container": "#f080c0", "on-primary": "#ffffff", "on-primary-container": "#2e1a28",
                        "secondary": "#7c52aa", "secondary-fixed": "#eedcff", "secondary-container": "#eedcff",
                        "tertiary": "#0096cc", "tertiary-fixed": "#c8eaff", "tertiary-container": "#40c0ee",
                        "surface": "#fef7ff", "background": "#fef7ff", "on-surface": "#2e1a28",
                        "on-surface-variant": "#604868", "on-background": "#2e1a28",
                        "surface-container": "#f8eef8", "surface-container-lowest": "#ffffff",
                        "outline-variant": "#dcc8e0", "outline": "#907898",
                        "surface-variant": "#f2e8f2"
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                    fontFamily: { "headline": ["DM Sans"], "body": ["DM Sans"] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'DM Sans', sans-serif; min-height: max(884px, 100dvh); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        @keyframes float-gentle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col pb-32">

    <!-- Header -->
    <header class="w-full top-0 sticky z-40 bg-[#fef7ff]/90 backdrop-blur-md flex justify-between items-center px-6 h-16">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-pink-500" style="font-variation-settings: 'FILL' 1;">favorite</span>
            <h1 class="text-2xl font-black text-pink-500 tracking-tight">MindSpace</h1>
        </div>
        <div class="w-9 h-9 rounded-full bg-primary-container flex items-center justify-center text-white text-sm font-bold border-2 border-primary/30">J</div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center px-8 max-w-md mx-auto w-full">

        <div class="text-center mb-8">
            <div class="w-24 h-24 bg-surface-container rounded-full flex items-center justify-center mx-auto mb-6" style="animation: float-gentle 4s ease-in-out infinite;">
                <span class="material-symbols-outlined text-outline text-5xl">auto_stories</span>
            </div>
            <h2 class="text-2xl font-bold text-on-surface mb-3">Your story starts here</h2>
            <p class="text-on-surface-variant font-medium leading-relaxed max-w-xs mx-auto">Every time you reflect, a page gets added. Over time, you'll see how far you've come.</p>
        </div>

        <button onclick="window.location.href='../welcome_back/code.html'" class="bg-primary text-on-primary font-bold px-8 py-3 rounded-full shadow-[0_4px_16px_rgba(224,64,160,0.25)] hover:scale-[1.03] active:scale-[0.98] transition-all flex items-center gap-2">
            <span class="material-symbols-outlined">self_improvement</span> Start Your First Reflection
        </button>

    </main>

    <!-- BottomNavBar -->
    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-white/80 backdrop-blur-lg rounded-t-[32px] shadow-[0_-4px_20px_rgba(224,64,160,0.1)] border-t border-pink-100">
        <a class="flex flex-col items-center justify-center text-zinc-400 px-5 py-2 hover:text-pink-400 transition-colors" href="../welcome_back/code.html">
            <span class="material-symbols-outlined">self_improvement</span>
            <span class="text-xs font-medium mt-1">Reflect</span>
        </a>
        <a class="flex flex-col items-center justify-center text-zinc-400 px-5 py-2 hover:text-pink-400 transition-colors" href="../organize_empty/code.html">
            <span class="material-symbols-outlined">auto_awesome_motion</span>
            <span class="text-xs font-medium mt-1">Organize</span>
        </a>
        <a class="flex flex-col items-center justify-center bg-pink-100 text-pink-600 rounded-full px-5 py-2" href="../journey_empty/code.html">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">auto_stories</span>
            <span class="text-xs font-medium mt-1">Journey</span>
        </a>
        <a class="flex flex-col items-center justify-center text-zinc-400 px-5 py-2 hover:text-pink-400 transition-colors" href="../settings_care/code.html">
            <span class="material-symbols-outlined">settings</span>
            <span class="text-xs font-medium mt-1">Settings</span>
        </a>
    </nav>
</body>
</html>
