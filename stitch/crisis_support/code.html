<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindSpace - Gentle Support</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#001a33",
                        "on-secondary-fixed": "#1a1030",
                        "outline": "#907898",
                        "on-error-container": "#9b1c1c",
                        "on-error": "#ffffff",
                        "error-container": "#ffe8e8",
                        "secondary": "#7c52aa",
                        "tertiary-fixed-dim": "#80d0f0",
                        "secondary-fixed-dim": "#c8a8e8",
                        "on-primary-fixed-variant": "#a02070",
                        "surface-bright": "#fef7ff",
                        "error": "#e53e3e",
                        "outline-variant": "#dcc8e0",
                        "on-primary-fixed": "#3d0028",
                        "surface-container": "#f8eef8",
                        "on-tertiary-container": "#00334d",
                        "on-surface": "#2e1a28",
                        "surface-tint": "#e040a0",
                        "primary-fixed-dim": "#f0a0cc",
                        "primary-fixed": "#ffd6ee",
                        "surface-dim": "#e0d6e0",
                        "on-background": "#2e1a28",
                        "primary-container": "#f080c0",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#604868",
                        "surface-variant": "#f2e8f2",
                        "on-tertiary-fixed-variant": "#005580",
                        "tertiary-fixed": "#c8eaff",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#eedcff",
                        "on-secondary-container": "#2e2040",
                        "tertiary": "#0096cc",
                        "primary": "#e040a0",
                        "surface-container-high": "#f2e8f2",
                        "on-primary-container": "#2e1a28",
                        "surface-container-highest": "#ece2ec",
                        "inverse-on-surface": "#fef7ff",
                        "secondary-container": "#eedcff",
                        "on-secondary": "#ffffff",
                        "tertiary-container": "#40c0ee",
                        "on-secondary-fixed-variant": "#4a3068",
                        "inverse-primary": "#f0a0cc",
                        "background": "#fbfcf8", /* slightly warmer, subdued */
                        "inverse-surface": "#2e1a28",
                        "surface": "#fbfcf8",
                        "surface-container-low": "#fbf2fb"
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["DM Sans"],
                        "body": ["DM Sans"],
                        "label": ["DM Sans"]
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'DM Sans', sans-serif; min-height: max(884px, 100dvh); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .bouncy-spring { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .bouncy-spring:active { transform: scale(0.97); }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col items-center relative overflow-hidden">
    <!-- Ambient Decor -->
    <div class="fixed top-[15%] right-[15%] w-[400px] h-[400px] bg-tertiary-fixed opacity-40 blur-[100px] rounded-full point-events-none z-0 mix-blend-multiply"></div>
    <div class="fixed bottom-[15%] left-[15%] w-[350px] h-[350px] bg-secondary-fixed opacity-40 blur-[100px] rounded-full point-events-none z-0 mix-blend-multiply"></div>

    <!-- Top Header - Very minimal -->
    <header class="w-full flex justify-end p-6 z-10 relative">
        <button onclick="window.location.href='../welcome_back/code.html'" class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-zinc-500 hover:bg-surface-variant transition-colors">
            <span class="material-symbols-outlined" data-icon="close">close</span>
        </button>
    </header>

    <main class="flex-1 w-full max-w-md px-8 flex flex-col pt-4 pb-20 z-10 relative">
        <!-- Soothing introduction -->
        <div class="mb-10 text-center animate-[fadeIn_1s_ease-out]">
            <h1 class="text-3xl font-bold text-on-surface mb-3 tracking-tight">It's okay.</h1>
            <p class="text-lg text-on-surface-variant font-medium leading-relaxed">It's completely fine if you don't have the words right now. We can still clear some space.</p>
        </div>

        <div class="flex-1 flex flex-col justify-center gap-4 w-full">
            <!-- Alternative 1: Breathe -->
            <button onclick="window.location.href='../processing.../code.html'" class="w-full bg-tertiary-fixed-dim/20 hover:bg-tertiary-fixed-dim/40 p-6 rounded-3xl border border-tertiary-fixed-dim/20 flex flex-col items-center text-center gap-3 bouncy-spring shadow-[0_4px_16px_rgba(0,150,204,0.03)] group">
                <div class="w-14 h-14 rounded-full bg-white flex items-center justify-center shadow-[0_4px_16px_rgba(0,150,204,0.1)] group-hover:scale-110 transition-transform">
                    <span class="material-symbols-outlined text-tertiary text-2xl" style="font-variation-settings: 'FILL' 1;">air</span>
                </div>
                <div>
                    <h3 class="font-bold text-xl text-on-tertiary-fixed">Breathe with me</h3>
                    <p class="text-sm text-tertiary-fixed-variant font-medium">Just 60 seconds of quiet</p>
                </div>
            </button>
            
            <!-- Alternative 2: Voice -->
            <button onclick="window.location.href='../processing.../code.html'" class="w-full bg-secondary-fixed/40 hover:bg-secondary-fixed/60 p-6 rounded-3xl border border-secondary-fixed-dim/30 flex flex-col items-center text-center gap-3 bouncy-spring shadow-[0_4px_16px_rgba(124,82,170,0.03)] group">
                <div class="w-14 h-14 rounded-full bg-white flex items-center justify-center shadow-[0_4px_16px_rgba(124,82,170,0.1)] group-hover:scale-110 transition-transform">
                    <span class="material-symbols-outlined text-secondary text-2xl" style="font-variation-settings: 'FILL' 1;">mic</span>
                </div>
                <div>
                    <h3 class="font-bold text-xl text-on-secondary-fixed">Just talk</h3>
                    <p class="text-sm text-secondary-fixed-variant font-medium">I'll listen and sort it out later</p>
                </div>
            </button>

            <!-- Alternative 3: Defer -->
            <button onclick="window.location.href='../processing.../code.html'" class="w-full bg-surface-container-lowest p-6 rounded-3xl border border-outline-variant hover:bg-surface-variant flex flex-col items-center text-center gap-3 bouncy-spring group">
                <div class="w-14 h-14 rounded-full bg-surface-container flex items-center justify-center shadow-sm group-hover:scale-110 transition-transform">
                    <span class="material-symbols-outlined text-zinc-500 text-2xl">bedtime</span>
                </div>
                <div>
                    <h3 class="font-bold text-xl text-on-surface">Come back to this</h3>
                    <p class="text-sm text-on-surface-variant font-medium">Close the app and try again tomorrow</p>
                </div>
            </button>
        </div>
    </main>
</body>
</html>
