<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindSpace - Reset Complete</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#001a33",
                        "on-secondary-fixed": "#1a1030",
                        "outline": "#907898",
                        "on-error-container": "#9b1c1c",
                        "on-error": "#ffffff",
                        "error-container": "#ffe8e8",
                        "secondary": "#7c52aa",
                        "tertiary-fixed-dim": "#80d0f0",
                        "secondary-fixed-dim": "#c8a8e8",
                        "on-primary-fixed-variant": "#a02070",
                        "surface-bright": "#fef7ff",
                        "error": "#e53e3e",
                        "outline-variant": "#dcc8e0",
                        "on-primary-fixed": "#3d0028",
                        "surface-container": "#f8eef8",
                        "on-tertiary-container": "#00334d",
                        "on-surface": "#2e1a28",
                        "surface-tint": "#e040a0",
                        "primary-fixed-dim": "#f0a0cc",
                        "primary-fixed": "#ffd6ee",
                        "surface-dim": "#e0d6e0",
                        "on-background": "#2e1a28",
                        "primary-container": "#f080c0",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#604868",
                        "surface-variant": "#f2e8f2",
                        "on-tertiary-fixed-variant": "#005580",
                        "tertiary-fixed": "#c8eaff",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#eedcff",
                        "on-secondary-container": "#2e2040",
                        "tertiary": "#0096cc",
                        "primary": "#e040a0",
                        "surface-container-high": "#f2e8f2",
                        "on-primary-container": "#2e1a28",
                        "surface-container-highest": "#ece2ec",
                        "inverse-on-surface": "#fef7ff",
                        "secondary-container": "#eedcff",
                        "on-secondary": "#ffffff",
                        "tertiary-container": "#40c0ee",
                        "on-secondary-fixed-variant": "#4a3068",
                        "inverse-primary": "#f0a0cc",
                        "background": "#fef7ff",
                        "inverse-surface": "#2e1a28",
                        "surface": "#fef7ff",
                        "surface-container-low": "#fbf2fb"
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["DM Sans"],
                        "body": ["DM Sans"],
                        "label": ["DM Sans"]
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'DM Sans', sans-serif; min-height: max(884px, 100dvh); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .bouncy-spring { transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .bouncy-spring:active { transform: scale(0.95); }
        @keyframes float-gentle {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.05); }
        }
        .animate-float { animation: float-gentle 5s ease-in-out infinite; }
        @keyframes bloom {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-bloom { animation: bloom 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
    <!-- Ambient Decor -->
    <div class="absolute top-[20%] left-[10%] w-64 h-64 bg-primary-fixed opacity-40 blur-[80px] rounded-full -z-10 animate-float"></div>
    <div class="absolute bottom-[10%] right-[10%] w-80 h-80 bg-tertiary-fixed opacity-40 blur-[80px] rounded-full -z-10" style="animation: float-gentle 7s ease-in-out infinite; animation-delay: 1.5s;"></div>

    <main class="flex flex-col items-center text-center px-8 z-10 w-full max-w-lg">
        <!-- Visual Celebration -->
        <div class="w-40 h-40 mb-10 relative flex justify-center items-center animate-bloom">
            <div class="absolute inset-0 bg-primary-fixed rounded-full animate-ping opacity-20" style="animation-duration: 3s;"></div>
            <div class="w-24 h-24 bg-surface-container-lowest rounded-full shadow-[0_8px_32px_rgba(224,64,160,0.2)] flex items-center justify-center z-10 relative overflow-hidden group">
                <span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">eco</span>
            </div>
        </div>

        <div class="space-y-4 mb-12 animate-bloom" style="animation-delay: 0.2s; opacity: 0;">
            <p class="text-sm font-bold text-secondary uppercase tracking-widest">Reset Complete</p>
            <h1 class="text-4xl font-black text-on-surface tracking-tight">You did it.</h1>
            <p class="text-lg text-on-surface-variant font-medium max-w-xs mx-auto leading-relaxed">Take a deep breath. You've cleared the fog and taken steps forward.</p>
        </div>

        <!-- How do you feel check-in -->
        <div class="w-full bg-surface-container-lowest p-6 rounded-3xl shadow-[0_4px_24px_rgba(224,64,160,0.06)] border border-primary-fixed/30 animate-bloom" style="animation-delay: 0.4s; opacity: 0;">
            <p class="text-sm font-bold text-on-surface mb-4">How does your space feel now?</p>
            <div class="flex justify-center gap-4">
                <button class="w-14 h-14 bg-surface-container rounded-full flex justify-center items-center hover:bg-tertiary-container hover:text-white transition-colors text-tertiary group bouncy-spring text-2xl" title="Light">
                    🌱
                </button>
                <button class="w-14 h-14 bg-surface-container rounded-full flex justify-center items-center hover:bg-secondary-container hover:text-secondary-fixed-dim transition-colors text-secondary group bouncy-spring text-2xl" title="Soft">
                    ☁️
                </button>
                <button class="w-14 h-14 bg-surface-container rounded-full flex justify-center items-center hover:bg-primary-container hover:text-white transition-colors text-primary group bouncy-spring text-2xl" title="Clear">
                    ✨
                </button>
            </div>
        </div>
        
        <div class="mt-12 animate-bloom" style="animation-delay: 0.6s; opacity: 0;">
            <button onclick="window.location.href='../the_brain_dump/code.html'" class="text-primary font-bold hover:bg-primary-fixed/50 px-6 py-3 rounded-full transition-colors flex items-center gap-2 group">
                Return to Home <span class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
            </button>
        </div>
    </main>
</body>
</html>
